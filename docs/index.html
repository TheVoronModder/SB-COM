<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Density Mass Calculator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 40px auto;
      padding: 20px;
      line-height: 1.5;
      background: #111;
      color: #f5f5f5;
    }

    h1 {
      margin-bottom: 10px;
    }

    .card {
      background: #1b1b1b;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 20px;
      margin-top: 20px;
    }

    label {
      display: block;
      margin-top: 14px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      border-radius: 8px;
      border: 1px solid #444;
      background: #0f0f0f;
      color: #fff;
      box-sizing: border-box;
    }

    button {
      margin-top: 18px;
      padding: 12px 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      background: #2ea44f;
      color: white;
    }

    button:hover {
      opacity: 0.95;
    }

    .result {
      margin-top: 20px;
      font-size: 1.2rem;
      font-weight: bold;
    }

    .formula {
      font-size: 1.05rem;
      margin-bottom: 10px;
    }

    .note {
      color: #bbb;
      font-size: 0.95rem;
      margin-top: 10px;
    }

    code {
      background: #222;
      padding: 2px 6px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <h1>Density Mass Calculator</h1>
  <p class="formula"><strong>New Density = Current Density × (Target Mass ÷ Current Mass)</strong></p>

  <div class="card">
    <label for="currentDensity">Current Density (g/cm³)</label>
    <input type="number" id="currentDensity" step="any" placeholder="Example: 6.020" />

    <label for="currentMass">Current Mass (g)</label>
    <input type="number" id="currentMass" step="any" placeholder="Example: 11.434" />

    <label for="targetMass">Target Mass (g)</label>
    <input type="number" id="targetMass" step="any" placeholder="Example: 4" />

    <button onclick="calculateDensity()">Calculate</button>

    <div class="result" id="result">New Density: —</div>
    <div class="note">Result shown in g/cm³</div>
  </div>

  <script>
    function calculateDensity() {
      const currentDensity = parseFloat(document.getElementById("currentDensity").value);
      const currentMass = parseFloat(document.getElementById("currentMass").value);
      const targetMass = parseFloat(document.getElementById("targetMass").value);
      const result = document.getElementById("result");

      if (
        isNaN(currentDensity) ||
        isNaN(currentMass) ||
        isNaN(targetMass) ||
        currentMass === 0
      ) {
        result.textContent = "New Density: Enter valid numbers, and Current Mass cannot be 0.";
        return;
      }

      const newDensity = currentDensity * (targetMass / currentMass);
      result.textContent = `New Density: ${newDensity.toFixed(3)} g/cm³`;
    }
  </script>
</body>
</html>
